<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#151922"/>
    </linearGradient>
    <linearGradient id="player" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2430"/>
      <stop offset="100%" stop-color="#0c0f14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.18" stroke="#7d8796" stroke-width="1">
    <path d="M60 0V720M120 0V720M180 0V720M240 0V720M300 0V720M360 0V720M420 0V720M480 0V720M540 0V720M600 0V720M660 0V720M720 0V720M780 0V720M840 0V720M900 0V720M960 0V720M1020 0V720M1080 0V720M1140 0V720" />
    <path d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200M0 360H1200M0 420H1200M0 480H1200M0 540H1200M0 600H1200M0 660H1200" />
  </g>

  <text x="70" y="82" fill="#f1f5f9" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700">
    16:9 容器里看到的“白边/灰边”从哪来
  </text>
  <text x="70" y="122" fill="#aab2c0" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22">
    不是页面多出了一条空白，而是播放器在容器比例不匹配时预留的区域
  </text>

  <!-- Main container -->
  <g filter="url(#shadow)">
    <rect x="110" y="180" width="980" height="360" rx="28" fill="url(#player)" stroke="#2f3846" stroke-width="2"/>

    <!-- Video area -->
    <rect x="110" y="180" width="980" height="308" rx="28" fill="#10141b"/>
    <rect x="110" y="180" width="980" height="308" rx="28" fill="none" stroke="#3a4454" stroke-width="2"/>

    <!-- Bottom strip -->
    <rect x="110" y="488" width="980" height="52" rx="0" fill="#6f7681"/>
    <rect x="110" y="488" width="980" height="52" rx="0" fill="#8b919a" opacity="0.34"/>

    <!-- Play button -->
    <g transform="translate(498 282)">
      <rect x="-78" y="-52" width="156" height="104" rx="28" fill="#ff0000"/>
      <path d="M-16 -24 L38 0 L-16 24 Z" fill="#ffffff"/>
    </g>

    <!-- Left content placeholder -->
    <circle cx="190" cy="280" r="18" fill="#dbe3ee" opacity="0.95"/>
    <text x="222" y="288" fill="#dbe3ee" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">
      视频主体区域
    </text>

    <!-- Bottom label -->
    <g>
      <rect x="690" y="500" width="306" height="28" rx="14" fill="#11161e" opacity="0.85"/>
      <text x="708" y="520" fill="#f5f7fb" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700">
        底部灰白区域：播放器控制区 / 预留区
      </text>
    </g>
  </g>

  <!-- Red arrows -->
  <g stroke="#ff3b30" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M320 200 C320 150, 320 150, 320 150" />
    <path d="M320 150 L300 178" />
    <path d="M320 150 L340 178" />
    <path d="M470 420 C490 470, 520 505, 560 520" />
    <path d="M560 520 L535 506" />
    <path d="M560 520 L548 492" />
  </g>

  <text x="248" y="180" fill="#ff3b30" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">
    容器比例不一致时，播放器会在这里补出空白
  </text>

  <text x="615" y="620" fill="#c7cfda" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20">
    解决方式：让外层容器固定为 16:9，再让 iframe 绝对定位铺满
  </text>
</svg>
